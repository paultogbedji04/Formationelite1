<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/jpeg" href="logo.jpg">
<title>Formations — FormationElite.fr</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --gold:#c9a84c;--gold-light:#e8c97a;--gold-dark:#8a6e2f;--bg:#080808;--bg2:#0f0f0f;--bg3:#151515;--border:rgba(201,168,76,0.15);--text:#f0ece0;--text-muted:#6b6556;--green:#2ecc71; }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:4px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}

  /* ── NAV ── */
  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:20px 60px;background:rgba(8,8,8,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
  .logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;letter-spacing:1px;color:var(--gold-light);text-decoration:none}
  .logo span{color:var(--text-muted)}
  .nav-links{display:flex;gap:32px;align-items:center}
  .nav-links a{color:#888;text-decoration:none;font-size:13px;letter-spacing:.5px;transition:color .2s;font-weight:500}
  .nav-links a:hover,.nav-links a.active{color:var(--gold-light)}
  .nav-cta{background:transparent!important;border:1px solid var(--gold)!important;color:var(--gold-light)!important;padding:9px 22px!important;border-radius:2px!important;font-size:12px!important;letter-spacing:1.5px!important;text-transform:uppercase!important;transition:all .3s!important}
  .nav-cta:hover{background:var(--gold)!important;color:var(--bg)!important}
  .nav-mobile-btn{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px}
  #mobileNav{display:none;position:fixed;top:61px;left:0;right:0;background:rgba(8,8,8,0.98);z-index:99;padding:16px 20px 24px;border-bottom:1px solid var(--border);backdrop-filter:blur(20px)}
  #mobileNav a{display:block;padding:14px 0;font-size:15px;color:#888;text-decoration:none;border-bottom:1px solid var(--border)}
  #mobileNav a:last-child{border-bottom:none;color:var(--gold-light);font-weight:600;margin-top:8px}

  /* ── PAGE HERO ── */
  .page-hero{padding:110px 60px 40px;background:var(--bg2);border-bottom:1px solid var(--border);position:relative;overflow:hidden}
  .page-hero::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(201,168,76,0.05) 0%,transparent 70%);pointer-events:none}
  .breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:#555;margin-bottom:16px}
  .breadcrumb a{color:#555;text-decoration:none;transition:color .2s}
  .breadcrumb a:hover{color:var(--gold-light)}
  .section-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:12px}
  .section-label::after{content:'';flex:1;max-width:40px;height:1px;background:var(--gold-dark)}
  .section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,4vw,48px);font-weight:300;line-height:1.1;margin-bottom:16px}
  .section-title em{font-style:italic;color:var(--gold-light)}
  .search-bar{display:flex;gap:10px;max-width:500px;margin-top:20px}
  #searchInput{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:13px 18px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s}
  #searchInput:focus{border-color:var(--gold)}
  #searchInput::placeholder{color:var(--text-muted)}

  /* ── FILTER BAR DESKTOP ── */
  .filter-bar{background:var(--bg3);border-bottom:1px solid var(--border);padding:12px 60px;position:sticky;top:61px;z-index:50;display:flex;align-items:center;gap:10px}
  .filter-scroll{display:flex;gap:8px;flex:1;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
  .filter-scroll::-webkit-scrollbar{display:none}
  .filter-btn{padding:7px 16px;border:1px solid var(--border);border-radius:100px;font-size:12px;color:#888;cursor:pointer;background:none;font-family:inherit;transition:all .2s;white-space:nowrap;flex-shrink:0}
  .filter-btn:hover,.filter-btn.active{border-color:var(--gold);color:var(--gold-light);background:rgba(201,168,76,.06)}
  .sort-select{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:7px 12px;color:var(--text);font-family:inherit;font-size:12px;outline:none;cursor:pointer;flex-shrink:0}
  .sort-select option{background:var(--bg3)}

  /* ── MOBILE FILTER DRAWER ── */
  .mobile-filter-btn{display:none;position:fixed;bottom:20px;right:20px;z-index:140;background:var(--gold);color:var(--bg);border:none;border-radius:100px;padding:13px 22px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 4px 20px rgba(201,168,76,0.4);letter-spacing:.5px}
  .filter-drawer{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px)}
  .filter-drawer.open{display:flex;align-items:flex-end;justify-content:center}
  .filter-drawer-inner{background:var(--bg3);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:24px 20px 40px;width:100%;max-width:100%;max-height:80vh;overflow-y:auto;overflow-x:hidden;animation:slideUp .3s ease;box-sizing:border-box}
  .filter-drawer-handle{width:40px;height:4px;background:#333;border-radius:4px;margin:0 auto 20px}
  .filter-drawer-title{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text)}
  .drawer-cats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;width:100%}
.drawer-cat-btn{padding:12px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;color:#888;cursor:pointer;background:none;font-family:inherit;transition:all .2s;text-align:left;display:flex;align-items:center;gap:6px;min-width:0;overflow:hidden}
.drawer-cat-btn span,.drawer-cat-btn{white-space:normal;word-break:break-word;line-height:1.3}
888;cursor:pointer;background:none;font-family:inherit;transition:all .2s;text-align:left;display:flex;align-items:center;gap:8px}
  .drawer-cat-btn.active{border-color:var(--gold);color:var(--gold-light);background:rgba(201,168,76,.06)}
  .drawer-sort{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:13px 16px;color:var(--text);font-family:inherit;font-size:14px;outline:none;cursor:pointer;margin-bottom:16px}
  .drawer-apply{width:100%;background:var(--gold);color:var(--bg);border:none;border-radius:6px;padding:15px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer}

  /* ── GRID SECTION ── */
  .grid-section{padding:28px 60px 60px;background:var(--bg)}
  .results-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
  .results-count{font-size:13px;color:#666}
  .formations-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}

  /* ── CARDS ── */
  .formation-card{background:var(--bg3);border:1px solid var(--border);border-radius:4px;overflow:hidden;transition:all .3s;cursor:pointer;position:relative}
  .formation-card:hover{border-color:rgba(201,168,76,.4);transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .card-badge{position:absolute;top:14px;left:14px;background:var(--gold);color:var(--bg);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:2px;z-index:2}
  .card-badge.new{background:#2ecc71}.card-badge.free{background:#3498db}
  .card-img-placeholder{width:100%;height:180px;display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,#1a1508,#2a2010);border-bottom:1px solid var(--border)}
  .card-body{padding:20px}
  .card-category{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
  .card-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;line-height:1.3;margin-bottom:8px;color:var(--text)}
  .card-author{font-size:12px;color:var(--text-muted);margin-bottom:14px}
  .card-desc{font-size:13px;color:#666;line-height:1.6;margin-bottom:18px}
  .card-stars{display:flex;align-items:center;gap:4px;margin-bottom:16px}
  .star{color:var(--gold);font-size:12px}
  .rating-count{font-size:11px;color:var(--text-muted);margin-left:4px}
  .card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:16px;border-top:1px solid var(--border)}
  .card-price{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--gold-light)}
  .card-price-old{font-size:13px;color:var(--text-muted);text-decoration:line-through;margin-left:6px}
  .card-price-free{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:#2ecc71}
  .btn-card{background:var(--gold);color:var(--bg);border:none;padding:10px 20px;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}
  .btn-card:hover{background:var(--gold-light)}
  .btn-card.free-btn{background:transparent;border:1px solid #2ecc71;color:#2ecc71}
  .btn-card.free-btn:hover{background:#2ecc71;color:var(--bg)}

  /* ── LOAD MORE ── */
  .load-more{display:block;width:100%;padding:16px;background:none;border:1px solid var(--border);border-radius:4px;color:#888;font-family:inherit;font-size:13px;cursor:pointer;transition:all .2s;margin-top:32px;text-align:center}
  .load-more:hover{border-color:var(--gold);color:var(--gold-light)}

  /* ── PAYMENT MODAL ── */
  .pay-option{display:flex;align-items:center;gap:14px;background:#0f0f0f;border-radius:8px;padding:14px 18px;text-decoration:none;transition:all .2s;margin-bottom:10px;cursor:pointer}

  /* ── FOOTER ── */
  footer{background:var(--bg);border-top:1px solid var(--border);padding:60px}
  .footer-grid{display:grid;grid-template-columns:2fr 1fr;gap:60px;margin-bottom:48px}
  .footer-logo{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold-light);margin-bottom:14px;display:block;text-decoration:none}
  .footer-desc{font-size:13px;color:var(--text-muted);line-height:1.7;margin-bottom:20px}
  .footer-col-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
  .footer-links{list-style:none}
  .footer-links li{margin-bottom:10px}
  .footer-links a{font-size:13px;color:#555;text-decoration:none;transition:color .2s}
  .footer-links a:hover{color:var(--gold-light)}
  .footer-bottom{border-top:1px solid var(--border);padding-top:24px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-muted)}
  .payment-icon{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:5px 10px;font-size:11px;color:#666}

  /* ========================================
     RESPONSIVE 900px
  ======================================== */
  @media(max-width:900px){
    nav{padding:16px 20px}
    .nav-links{display:none}
    .nav-mobile-btn{display:block}
    .page-hero{padding:90px 24px 32px}
    .filter-bar{padding:10px 20px}
    .grid-section{padding:20px 24px 60px}
    footer{padding:40px 24px}
    .footer-grid{grid-template-columns:1fr 1fr;gap:32px}
    .footer-bottom{flex-direction:column;gap:12px;text-align:center}
  }

  /* ========================================
     RESPONSIVE 600px MOBILE
  ======================================== */
  @media(max-width:600px){
    nav{padding:14px 16px}

    /* Hero */
   .page-hero{padding:90px 16px 24px}
    .search-bar{max-width:100%}
    #searchInput{font-size:14px;padding:12px 14px}

    /* Filter bar — cachée, remplacée par le drawer */
    .filter-bar{display:none}
    .mobile-filter-btn{display:flex;align-items:center;gap:6px}

    /* Grid */
    .grid-section{padding:16px 16px 100px} /* padding-bottom pour le bouton flottant */
    .formations-grid{grid-template-columns:1fr}
    .results-bar{margin-bottom:14px}

    /* Footer */
    footer{padding:32px 16px}
    .footer-grid{grid-template-columns:1fr;gap:20px}
    .footer-bottom{flex-direction:column;gap:12px;text-align:center}
    .footer-bottom > div:last-child{flex-wrap:wrap;justify-content:center}
  }

  @media(max-width:380px){
    .mobile-filter-btn{padding:12px 18px;font-size:12px}
  }
</style>
</head>

<!-- PAGE HERO -->

    <!-- Tri -->

      <option value="price-asc">Prix croissant</option>

    <button class="drawer-apply" onclick="applyDrawer()">Voir les formations</button>
  </div>
</div>

// ── CARDS ──
function cardHtml(f) {
  const isFree = f.prix?.toLowerCase() === 'gratuit';
  const emoji = f.emoji || CAT_EMOJIS[f.categorie] || '📚';
  const imgHtml = f.image_principale
    ? `<img src="${f.image_principale}" style="width:100%;height:180px;object-fit:cover;display:block" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="card-img-placeholder" style="display:none">${emoji}</div>`
    : `<div class="card-img-placeholder">${emoji}</div>`;
  const desc = f.description || '';
  const shortDesc = desc.length > 90 ? desc.slice(0,90)+'...' : desc;
  return `
  <div class="formation-card" onclick="window.location='formation.html?id=${f.id}'">
    ${f.badge ? `<div class="card-badge ${f.badge==='Gratuit'?'free':f.badge==='Nouveau'?'new':''}">${f.badge}</div>` : ''}
    ${imgHtml}
    <div class="card-body">
      <div class="card-category">${f.categorie||''}</div>
      <div class="card-title">${f.titre}</div>
      <div class="card-author">Par ${f.auteur||''}</div>
      <div class="card-desc">${shortDesc}</div>
      <div class="card-stars"><span class="star">★★★★★</span><span class="rating-count">5.0</span></div>
      <div class="card-footer">
        <div>${isFree ? '<span class="card-price-free">Gratuit</span>' : `<span class="card-price">${f.prix}</span>${f.ancien_prix ? `<span class="card-price-old">${f.ancien_prix}</span>` : ''}`}</div>
        <div style="display:flex;gap:6px">
          ${!isFree ? `<button class="btn-card" style="background:none;border:1px solid var(--border);color:#888;padding:10px 10px" onclick="event.stopPropagation();ajouterFormationAuPanier('${f.id}')" title="Ajouter au panier">🛒</button>` : ''}
          <button class="btn-card ${isFree?'free-btn':''}" onclick="event.stopPropagation();handleBuy('${f.id}')">${isFree?'Obtenir':'Acheter'}</button>
        </div>
      </div>
    </div>
  </div>`;
}

function ajouterFormationAuPanier(id) {
  const f = allFormations.find(x => x.id === id);
  if (!f) return;
  ajouterAuPanier({
    id: f.id, titre: f.titre, prix: f.prix,
    emoji: f.emoji || '📚', auteur: f.auteur || '', categorie: f.categorie || ''
  });
}

function handleBuy(id) {
  const f = allFormations.find(x => x.id === id);
  if (!f) return;
  const isFree = f.prix ? f.prix.toString().trim().toLowerCase() === 'gratuit' : false;
  if (isFree) {
    openGratuitModal(encodeURIComponent(JSON.stringify({
      id: f.id, titre: f.titre, auteur: f.auteur || '', categorie: f.categorie || '',
      emoji: f.emoji || '📚', ancien_prix: f.ancien_prix || '', lien_acces: f.lien_acces || ''
    })));
    return;
  }
  window.location.href = 'checkout.html?id=' + encodeURIComponent(f.id) + '&titre=' + encodeURIComponent(f.titre) + '&prix=' + encodeURIComponent(f.prix) + '&emoji=' + encodeURIComponent(f.emoji || '📚');
}

function showPaymentModal(f) {
  const isMob = window.innerWidth <= 600;
  const overlay = document.createElement('div');
  overlay.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;display:flex;align-items:${isMob?'flex-end':'center'};justify-content:center;padding:0;backdrop-filter:blur(12px)`;
  const hasStripe = !!f.stripe_link, hasPaypal = !!f.paypal_link, hasBinance = !!f.binance_id;
  const stripeBtn = hasStripe ? `<a href="${f.stripe_link}" target="_blank" class="pay-option" style="border:1px solid rgba(201,168,76,0.2);text-decoration:none"><span style="font-size:26px">💳</span><div><div style="color:#f0ece0;font-weight:600;font-size:14px">Carte bancaire</div><div style="color:#666;font-size:12px">Visa, Mastercard — Stripe</div></div><span style="margin-left:auto;color:#c9a84c">→</span></a>` : '';
  const paypalBtn = hasPaypal ? `<a href="${f.paypal_link}" target="_blank" class="pay-option" style="border:1px solid rgba(0,112,240,0.2);text-decoration:none"><span style="font-size:26px">🅿️</span><div><div style="color:#f0ece0;font-weight:600;font-size:14px">PayPal</div><div style="color:#666;font-size:12px">Compte PayPal ou carte</div></div><span style="margin-left:auto;color:#0070f0">→</span></a>` : '';
  const binanceBtn = hasBinance ? `<div class="pay-option" style="border:1px solid rgba(240,176,0,0.2)" onclick="copyBinance('${f.binance_id}',this)"><span style="font-size:26px">₿</span><div style="flex:1"><div style="color:#f0ece0;font-weight:600;font-size:14px">Binance Pay</div><div style="color:#666;font-size:12px">ID: <span style="color:#f0b000">${f.binance_id}</span></div></div><span style="color:#f0b000;font-size:11px;background:rgba(240,176,0,0.1);padding:3px 8px;border-radius:20px">Copier</span></div>` : '';
  const telegramBtn = `<a href="https://t.me/CreativeagencyFr" target="_blank" class="pay-option" style="border:1px solid rgba(41,182,246,0.2);text-decoration:none"><span style="font-size:26px">📲</span><div><div style="color:#f0ece0;font-weight:600;font-size:14px">Telegram</div><div style="color:#666;font-size:12px">Livraison manuelle sous 24h</div></div><span style="margin-left:auto;color:#29b6f6">→</span></a>`;
  overlay.innerHTML = `<div style="background:#0a0a0a;border:1px solid rgba(201,168,76,0.25);border-radius:${isMob?'16px 16px 0 0':'16px'};padding:${isMob?'24px 20px 36px':'32px'};max-width:460px;width:100%;max-height:92vh;overflow-y:auto">
    ${isMob?'<div style="width:40px;height:4px;background:#222;border-radius:4px;margin:0 auto 20px"></div>':''}
    <div style="text-align:center;margin-bottom:22px">
      <div style="font-size:32px;margin-bottom:8px">${f.emoji||'📚'}</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:20px;color:#f0ece0;margin-bottom:3px">${f.titre}</div>
      <div style="font-size:12px;color:#666;margin-bottom:6px">Par ${f.auteur||''}</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:30px;color:#e8c97a">${f.prix}</div>
    </div>
    <div style="font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;text-align:center">Choisissez votre moyen de paiement</div>
    ${stripeBtn}${paypalBtn}${binanceBtn}
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.05)">${telegramBtn}</div>
    <button onclick="this.closest('[style*=fixed]').remove()" style="display:block;width:100%;margin-top:12px;background:none;border:1px solid #1a1a1a;color:#555;padding:12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:14px">Fermer</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
}

function copyBinance(id, el) {
  navigator.clipboard.writeText(id).then(() => {
    const span = el.querySelector('span:last-child');
    const orig = span.textContent;
    span.textContent = '✅ Copié!';
    setTimeout(() => { span.textContent = orig; }, 2000);
  });
}

// ── INIT ──
async function init() {
  try {
    const data = await sbGet('formations?select=*&actif=eq.true&order=created_at.desc');
    if (Array.isArray(data)) {
      allFormations = data;
      window._formations = data;
      buildFilters(data);
      checkUrlParams();
      // Show sort on mobile
      if (window.innerWidth <= 600) {
        document.getElementById('sortSelectMobile').style.display = 'block';
      }
    }
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:#555">Erreur de chargement</div>';
  }
}

function checkUrlParams() {
  const params = new URLSearchParams(window.location.search);
  const cat = params.get('cat');
  const q = params.get('q');
  if (cat) {
    currentCat = decodeURIComponent(cat);
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === currentCat));
    updateDrawerCats();
  }
  if (q) {
    document.getElementById('searchInput').value = q;
    currentSearch = q.toLowerCase();
  }
  applyFilters();
  updateActiveLabel();
}

function buildFilters(data) {
  const cats = [...new Set(data.map(f => f.categorie).filter(Boolean))].sort();

  // Desktop filter bar
  document.getElementById('filterBtns').innerHTML =
    `<button class="filter-btn ${currentCat==='Tous'?'active':''}" data-cat="Tous" onclick="setFilter(this,'Tous')">⚡ Tous (${data.length})</button>` +
    cats.map(cat => {
      const count = data.filter(f => f.categorie === cat).length;
      return `<button class="filter-btn ${currentCat===cat?'active':''}" data-cat="${cat}" onclick="setFilter(this,'${cat}')">${CAT_EMOJIS[cat]||'📚'} ${cat} (${count})</button>`;
    }).join('');

  // Mobile drawer cats
  buildDrawerCats(cats, data);
}

function buildDrawerCats(cats, data) {
  document.getElementById('drawerCats').innerHTML =
    `<button class="drawer-cat-btn ${currentCat==='Tous'?'active':''}" data-cat="Tous" onclick="selectDrawerCat(this,'Tous')">⚡ Tous</button>` +
    cats.map(cat => `<button class="drawer-cat-btn ${currentCat===cat?'active':''}" data-cat="${cat}" onclick="selectDrawerCat(this,'${cat}')">${CAT_EMOJIS[cat]||'📚'} ${cat}</button>`).join('');
}

function updateDrawerCats() {
  document.querySelectorAll('.drawer-cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === currentCat));
}

function selectDrawerCat(btn, cat) {
  document.querySelectorAll('.drawer-cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function setFilter(btn, cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = cat;
  displayed = 24;
  applyFilters();
  updateActiveLabel();
}

function handleSearch() {
  currentSearch = document.getElementById('searchInput').value.toLowerCase();
  displayed = 24;
  applyFilters();
}

function syncSort(el) {
  document.getElementById('sortSelect').value = el.value;
  applyFilters();
}

function applyFilters() {
  const sort = document.getElementById('sortSelect').value;
  filtered = allFormations.filter(f => {
    const matchCat = currentCat === 'Tous' || f.categorie === currentCat;
    const matchSearch = !currentSearch || f.titre?.toLowerCase().includes(currentSearch) || f.auteur?.toLowerCase().includes(currentSearch) || f.categorie?.toLowerCase().includes(currentSearch);
    return matchCat && matchSearch;
  });
  if (sort === 'price-asc') filtered.sort((a,b) => (parseFloat(a.prix)||0) - (parseFloat(b.prix)||0));
  else if (sort === 'price-desc') filtered.sort((a,b) => (parseFloat(b.prix)||0) - (parseFloat(a.prix)||0));
  else if (sort === 'alpha') filtered.sort((a,b) => a.titre.localeCompare(b.titre));
  document.getElementById('resultCount').textContent = `${filtered.length} formation${filtered.length>1?'s':''} trouvée${filtered.length>1?'s':''}`;
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const toShow = filtered.slice(0, displayed);
  if (filtered.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:#555"><div style="font-size:40px;margin-bottom:16px">🔍</div><div style="font-size:16px;margin-bottom:12px">Aucune formation trouvée</div><button onclick="resetFilters()" style="background:none;border:1px solid var(--border);color:var(--gold);padding:10px 24px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:13px">Réinitialiser les filtres</button></div>`;
    document.getElementById('loadMoreBtn').style.display = 'none';
    return;
  }
  grid.innerHTML = toShow.map(cardHtml).join('');
  const btn = document.getElementById('loadMoreBtn');
  btn.style.display = displayed >= filtered.length ? 'none' : 'block';
  if (displayed < filtered.length) btn.textContent = `Voir plus (${filtered.length - displayed} restantes)`;
}

function loadMore() {
  displayed += 24;
  renderGrid();
}

function resetFilters() {
  currentCat = 'Tous';
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  updateDrawerCats();
  displayed = 24;
  applyFilters();
  updateActiveLabel();
}

function updateActiveLabel() {
  const label = document.getElementById('activeFilterLabel');
  if (label) label.textContent = currentCat !== 'Tous' ? `· ${currentCat}` : '';
}

// ── DRAWER ──
function openDrawer() {
  document.getElementById('filterDrawer').classList.add('open');
  document.body.style.overflow = 'hidden';
  // Sync drawer state
  document.getElementById('drawerSort').value = document.getElementById('sortSelect').value;
  updateDrawerCats();
}

function closeDrawer() {
  document.getElementById('filterDrawer').classList.remove('open');
  document.body.style.overflow = '';
}

function handleDrawerClick(e) {
  if (e.target === document.getElementById('filterDrawer')) closeDrawer();
}

function applyDrawer() {
  const selectedCat = document.querySelector('.drawer-cat-btn.active')?.dataset.cat || 'Tous';
  const sort = document.getElementById('drawerSort').value;
  currentCat = selectedCat;
  document.getElementById('sortSelect').value = sort;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === currentCat));
  displayed = 24;
  applyFilters();
  updateActiveLabel();
  closeDrawer();
  window.scrollTo({top: document.querySelector('.grid-section').offsetTop - 70, behavior:'smooth'});
}

init();
</script>




<script>
const PANIER_KEY="fe_panier";
function getPanier(){try{return JSON.parse(localStorage.getItem(PANIER_KEY))||[];}catch(e){return[];}}
function savePanier(items){localStorage.setItem(PANIER_KEY,JSON.stringify(items));updatePanierBadge();if(document.getElementById("panierDrawer"))renderPanierDrawer();}
function ajouterAuPanier(formation){const panier=getPanier();const existe=panier.find(f=>f.id===formation.id);if(existe){showPanierToast("📚 Déjà dans votre panier !","info");ouvrirPanier();return;}panier.push({id:formation.id,titre:formation.titre,prix:formation.prix,prixNum:parseFloat((formation.prix||"0").replace("€","").replace(",",".").trim())||0,emoji:formation.emoji||"📚",auteur:formation.auteur||"",categorie:formation.categorie||""});savePanier(panier);showPanierToast("🛒 Ajouté au panier !","success");}
function retirerDuPanier(id){savePanier(getPanier().filter(f=>f.id!==id));}
function viderPanier(){savePanier([]);}
function getTotalPanier(){return getPanier().reduce((sum,f)=>sum+(f.prixNum||0),0);}
function updatePanierBadge(){const count=getPanier().length;document.querySelectorAll(".panier-badge").forEach(el=>{el.textContent=count;el.style.display=count>0?"flex":"none";});}
function showPanierToast(msg,type){let t=document.getElementById("panierToast");if(!t){t=document.createElement("div");t.id="panierToast";t.style.cssText="position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#0f0f0f;border:1px solid rgba(201,168,76,0.3);border-radius:100px;padding:12px 22px;font-family:sans-serif;font-size:13px;color:#f0ece0;z-index:9999;opacity:0;transition:all .3s ease;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.6);pointer-events:none";document.body.appendChild(t);}t.style.borderColor=type==="info"?"rgba(41,182,246,0.4)":"rgba(46,204,113,0.4)";t.textContent=msg;t.style.opacity="1";t.style.transform="translateX(-50%) translateY(0)";clearTimeout(t._timer);t._timer=setTimeout(()=>{t.style.opacity="0";t.style.transform="translateX(-50%) translateY(20px)";},2800);}
function injectPanierDrawer(){if(document.getElementById("panierDrawer"))return;const d=document.createElement("div");d.id="panierDrawer";d.style.cssText="position:fixed;inset:0;z-index:9998;display:none;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px)";d.innerHTML='<div id="panierPanel" style="position:absolute;top:0;right:0;bottom:0;width:100%;max-width:420px;background:#0f0f0f;border-left:1px solid rgba(201,168,76,0.2);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow:hidden"><div style="padding:20px 24px;border-bottom:1px solid rgba(201,168,76,0.12);display:flex;justify-content:space-between;align-items:center;flex-shrink:0"><div><div style="font-family:Cormorant Garamond,serif;font-size:22px;color:#f0ece0">Mon Panier</div><div style="font-size:12px;color:#555;margin-top:2px" id="panierCount">0 formation</div></div><button onclick="fermerPanier()" style="background:none;border:1px solid #1a1a1a;color:#666;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center">✕</button></div><div id="panierItems" style="flex:1;overflow-y:auto;padding:16px 20px"></div><div id="panierFooter" style="padding:20px 24px;border-top:1px solid rgba(201,168,76,0.12);flex-shrink:0"></div></div>';document.body.appendChild(d);d.addEventListener("click",e=>{if(e.target===d)fermerPanier();});renderPanierDrawer();}
function renderPanierDrawer(){const panier=getPanier();const total=getTotalPanier();const count=panier.length;const c=document.getElementById("panierCount");if(c)c.textContent=count+" formation"+(count>1?"s":"");const items=document.getElementById("panierItems");if(items){if(count===0){items.innerHTML='<div style="text-align:center;padding:60px 20px;color:#444"><div style="font-size:48px;margin-bottom:16px">🛒</div><div style="font-size:15px;margin-bottom:8px;color:#666">Votre panier est vide</div><a href="formations.html" onclick="fermerPanier()" style="display:inline-block;margin-top:20px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);color:#c9a84c;padding:10px 24px;border-radius:4px;text-decoration:none;font-size:13px">Voir les formations →</a></div>';}else{items.innerHTML=panier.map(f=>`<div style="display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.04)"><div style="font-size:28px;flex-shrink:0;width:40px;text-align:center">${f.emoji}</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:#f0ece0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.titre}</div><div style="font-size:11px;color:#555;margin-top:2px">${f.categorie}</div></div><div style="font-family:Cormorant Garamond,serif;font-size:18px;color:#e8c97a;flex-shrink:0">${f.prix}</div><button onclick="retirerDuPanier('${f.id}')" style="background:none;border:none;color:#555;cursor:pointer;font-size:18px;padding:4px;flex-shrink:0;line-height:1">✕</button></div>`).join("");}}const footer=document.getElementById("panierFooter");if(footer){if(count===0){footer.innerHTML="";}else{footer.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span style="font-size:14px;color:#888">Total</span><span style="font-family:Cormorant Garamond,serif;font-size:28px;color:#e8c97a;font-weight:600">${total.toFixed(2)}€</span></div><button onclick="commanderPanier()" style="width:100%;background:#c9a84c;color:#080808;border:none;border-radius:6px;padding:15px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;margin-bottom:10px">🛒 Commander (${total.toFixed(2)}€)</button><button onclick="viderPanier()" style="width:100%;background:none;border:1px solid #1a1a1a;color:#555;padding:11px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px">Vider le panier</button>`;}}}
function ouvrirPanier(){injectPanierDrawer();const d=document.getElementById("panierDrawer");const p=document.getElementById("panierPanel");if(!d)return;d.style.display="block";requestAnimationFrame(()=>{p.style.transform="translateX(0)";});document.body.style.overflow="hidden";}
function fermerPanier(){const d=document.getElementById("panierDrawer");const p=document.getElementById("panierPanel");if(!d)return;p.style.transform="translateX(100%)";setTimeout(()=>{d.style.display="none";document.body.style.overflow="";},350);}
function commanderPanier(){const panier=getPanier();if(panier.length===0)return;const total=getTotalPanier();if(panier.length===1){const f=panier[0];fermerPanier();window.location.href="checkout.html?id="+f.id+"&titre="+encodeURIComponent(f.titre)+"&prix="+encodeURIComponent(f.prix)+"&emoji="+encodeURIComponent(f.emoji);}else{const ids=panier.map(f=>f.id).join(",");const titres=panier.map(f=>f.titre).join(" + ");fermerPanier();window.location.href="checkout.html?mode=panier&ids="+encodeURIComponent(ids)+"&titre="+encodeURIComponent(titres.slice(0,80))+"&prix="+encodeURIComponent(total.toFixed(2)+"€")+"&emoji=🛒&count="+panier.length;}}
document.addEventListener("DOMContentLoaded",function(){injectPanierDrawer();updatePanierBadge();});
</script>

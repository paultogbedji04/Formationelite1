async function sbGet(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`}
  });
  return res.json();
}

function cardHtml(f) {
  const isFree = f.prix?.toLowerCase() === 'gratuit';
  const emoji = f.emoji || '📚';
  const shortDesc = (f.description || '').length > 90 ? (f.description || '').slice(0,90)+'...' : (f.description || '');

  return `
  <div class="formation-card" onclick="window.location='formation.html?id=${f.id}'">
    ${f.badge ? `<div class="card-badge">${f.badge}</div>` : ''}
    <div class="card-img-placeholder">${emoji}</div>
    <div class="card-body">
      <div class="card-category">${f.categorie||''}</div>
      <div class="card-title">${f.titre}</div>
      <div class="card-author">Par ${f.auteur||''}</div>
      <div class="card-desc">${shortDesc}</div>
      <div class="card-stars"><span class="star">★★★★★</span><span class="rating-count">5.0</span></div>
      
      <div class="card-footer">
        <div>${isFree ? '<span class="card-price-free">Gratuit</span>' : `<span class="card-price">${f.prix}</span>`}</div>
        <button class="btn-card" onclick="event.stopPropagation();handleBuy('${f.id}',window._formations||[])">Acheter</button>
      </div>
    </div>
  </div>`;
}

async function handleBuy(id, formations) {
  const f = formations.find(x => x.id === id);
  if (!f) return;

  const titre = encodeURIComponent(f.titre || 'Formation');
  const prix = encodeURIComponent(f.prix || '0€');
  
  window.location.href = `checkout.html?id=${f.id}&titre=${titre}&prix=${prix}`;
}

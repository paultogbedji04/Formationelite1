<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/jpeg" href="logo.jpg">
<title>Formation — FormationElite.fr</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --gold:#c9a84c;--gold-light:#e8c97a;--gold-dark:#8a6e2f;--bg:#080808;--bg2:#0f0f0f;--bg3:#151515;--border:rgba(201,168,76,0.15);--text:#f0ece0;--text-muted:#6b6556;--green:#2ecc71; }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:4px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}

  /* ── NAV ── */
  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:20px 60px;background:rgba(8,8,8,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
  .logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;letter-spacing:1px;color:var(--gold-light);text-decoration:none}
  .logo span{color:var(--text-muted)}
  .nav-links{display:flex;gap:32px;align-items:center}
  .nav-links a{color:#888;text-decoration:none;font-size:13px;letter-spacing:.5px;transition:color .2s;font-weight:500}
  .nav-links a:hover,.nav-links a.active{color:var(--gold-light)}
  .nav-cta{background:transparent!important;border:1px solid var(--gold)!important;color:var(--gold-light)!important;padding:9px 22px!important;border-radius:2px!important;font-size:12px!important;letter-spacing:1.5px!important;text-transform:uppercase!important;transition:all .3s!important}
  .nav-cta:hover{background:var(--gold)!important;color:var(--bg)!important}
  .nav-mobile-btn{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px}
  #mobileNav{display:none;position:fixed;top:61px;left:0;right:0;background:rgba(8,8,8,0.98);z-index:99;padding:16px 20px 24px;border-bottom:1px solid var(--border);backdrop-filter:blur(20px)}
  #mobileNav a{display:block;padding:14px 0;font-size:15px;color:#888;text-decoration:none;border-bottom:1px solid var(--border);transition:color .2s}
  #mobileNav a:last-child{border-bottom:none;color:var(--gold-light);font-weight:600;margin-top:8px}

  /* ── CARDS ── */
  .formation-card{background:var(--bg3);border:1px solid var(--border);border-radius:4px;overflow:hidden;transition:all .3s;cursor:pointer;position:relative}
  .formation-card:hover{border-color:rgba(201,168,76,.4);transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .card-badge{position:absolute;top:10px;left:10px;background:var(--gold);color:var(--bg);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:2px;z-index:2}
  .card-badge.new{background:rgba(8,8,8,0.85);border:1px solid var(--gold);color:var(--gold-light)}
  .card-badge.free{background:#3498db}
  .card-img-placeholder{width:100%;height:154px;display:flex;align-items:center;justify-content:center;font-size:44px;background:linear-gradient(135deg,#1a1508,#2a2010);border-bottom:1px solid var(--border)}
  .card-body{padding:16px}
  .card-category{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
  .card-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;line-height:1.3;margin-bottom:8px;color:var(--text)}
  .card-author{font-size:12px;color:var(--text-muted);margin-bottom:14px}
  .card-stars{display:flex;align-items:center;gap:4px;margin-bottom:14px}
  .star{color:var(--gold);font-size:12px}
  .rating-count{font-size:11px;color:var(--text-muted);margin-left:4px}
  .card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--border);gap:10px;flex-wrap:wrap}
  .card-price{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--gold-light)}
  .card-price-old{font-size:12px;color:var(--text-muted);text-decoration:line-through;margin-left:4px}
  .card-price-free{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:#2ecc71}
  .btn-card{background:var(--gold);color:var(--bg);border:none;padding:9px 16px;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}
  .btn-card:hover{background:var(--gold-light)}
  .btn-card.free-btn{background:transparent;border:1px solid #2ecc71;color:#2ecc71}
  .btn-card.free-btn:hover{background:#2ecc71;color:var(--bg)}

  /* ── BREADCRUMB ── */
  .breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:#555;margin-bottom:20px;flex-wrap:wrap}
  .breadcrumb a{color:#555;text-decoration:none;transition:color .2s}
  .breadcrumb a:hover{color:var(--gold-light)}
  .breadcrumb span{color:#333}

  /* ── DETAIL HERO ── */
  .detail-hero{padding:96px 60px 0}

  /* ── DETAIL GRID ── */
  .detail-grid{display:grid;grid-template-columns:1fr 360px;gap:48px;max-width:1100px;margin:0 auto;padding:48px 60px;align-items:start}

  /* ── STICKY CARD (desktop) ── */
  .sticky-card{position:sticky;top:110px;background:var(--bg3);border:1px solid rgba(201,168,76,0.25);border-radius:12px;overflow:hidden}
  .sticky-card-header{padding:24px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#1a1508,#0f0f0f);text-align:center}
  .sticky-price{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;color:var(--gold-light);line-height:1}
  .sticky-price-old{font-size:14px;color:var(--text-muted);text-decoration:line-through;margin-top:4px}
  .sticky-body{padding:20px}
  .btn-buy-main{width:100%;background:var(--gold);color:var(--bg);border:none;border-radius:6px;padding:16px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;letter-spacing:.5px;transition:all .3s;margin-bottom:10px}
  .btn-buy-main:hover{background:var(--gold-light)}
  .btn-telegram{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:none;border:1px solid rgba(41,182,246,0.3);color:#29b6f6;border-radius:6px;padding:13px;text-decoration:none;font-size:13px;font-weight:600;transition:all .3s;margin-bottom:16px}
  .btn-telegram:hover{border-color:#29b6f6}
  .include-item{display:flex;align-items:center;gap:10px;font-size:13px;color:#888;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
  .include-item::before{content:'✓';color:var(--gold);font-weight:700;flex-shrink:0}
  .include-item:last-child{border-bottom:none}
  .trust-mini{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);text-align:center;font-size:11px;color:#555;line-height:1.8}

  /* ── SECTION BLOCKS ── */
  .section-block{margin-bottom:36px}
  .section-block h3{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;margin-bottom:18px;color:var(--text);padding-bottom:10px;border-bottom:2px solid var(--gold);display:inline-block}
  .detail-title{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,4vw,48px);font-weight:400;line-height:1.1;margin-bottom:14px}
  .detail-author{font-size:14px;color:var(--text-muted);margin-bottom:20px;display:flex;align-items:center;gap:8px}
  .detail-desc{font-size:15.5px;color:#b8b3a8;line-height:1.85;max-width:680px}
.detail-desc h3{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold-light);margin:16px 0 8px;font-weight:500}
.detail-desc strong{color:var(--text);font-weight:700}
  .badge-cat{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;background:rgba(201,168,76,0.1);color:var(--gold);border:1px solid rgba(201,168,76,0.2);margin-bottom:14px}

  /* ── SCREENSHOTS CAROUSEL ── */
  .ss-carousel{position:relative;width:100%;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--bg3)}
  .ss-track{display:flex;transition:transform .5s ease}
  .ss-slide{flex:0 0 100%;width:100%}
  .ss-slide img{width:100%;height:320px;object-fit:cover;display:block;cursor:zoom-in}
  .ss-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(8,8,8,0.6);border:1px solid rgba(201,168,76,0.3);color:var(--gold-light);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s;z-index:2}
  .ss-arrow:hover{background:rgba(8,8,8,0.9);border-color:var(--gold)}
  .ss-arrow.prev{left:14px}
  .ss-arrow.next{right:14px}
  .ss-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:2}
  .ss-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.35);cursor:pointer;transition:all .2s}
  .ss-dot.active{background:var(--gold);width:20px;border-radius:4px}

  /* ── RELATED GRID ── */
  .related-section{padding:0 60px 60px}
  .related-section .section-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
  .related-section h3{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,3vw,34px);font-weight:300;margin-bottom:20px}
  .related-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}

  /* ── GARANTIE ── */
  .g.garantie-box{background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.18);border-radius:8px;padding:18px 20px;display:flex;gap:14px;align-items:flex-start;margin-bottom:36px}

  /* ── FOOTER ── */
  footer{background:var(--bg);border-top:1px solid var(--border);padding:60px}
  .footer-grid{display:grid;grid-template-columns:2fr 1fr;gap:60px;margin-bottom:48px}
  .footer-logo{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold-light);margin-bottom:14px;display:block;text-decoration:none}
  .footer-desc{font-size:13px;color:var(--text-muted);line-height:1.7;margin-bottom:20px}
  .footer-col-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
  .footer-links{list-style:none}
  .footer-links li{margin-bottom:10px}
  .footer-links a{font-size:13px;color:#555;text-decoration:none;transition:color .2s}
  .footer-links a:hover{color:var(--gold-light)}
  .footer-bottom{border-top:1px solid var(--border);padding-top:24px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-muted)}
  .payment-icon{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:5px 10px;font-size:11px;color:#666}

  /* ── MOBILE CTA BAR (sticky bottom) ── */
  .mobile-cta-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(8,8,8,0.97);border-top:1px solid rgba(201,168,76,0.2);padding:12px 16px;backdrop-filter:blur(20px)}
  .mobile-cta-inner{display:flex;gap:10px;align-items:center;max-width:500px;margin:0 auto}
  .mobile-cta-price{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold-light);flex-shrink:0;line-height:1}
  .mobile-cta-price.free{color:var(--green)}
  .mobile-cta-btn{flex:1;background:var(--gold);color:var(--bg);border:none;border-radius:6px;padding:14px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;letter-spacing:.3px}
  .mobile-cta-tg{background:none;border:1px solid rgba(41,182,246,0.4);color:#29b6f6;border-radius:6px;padding:14px 16px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;text-decoration:none;display:flex;align-items:center}

  /* ── PAYMENT MODAL ── */
  .pay-option{display:flex;align-items:center;gap:14px;background:#0f0f0f;border-radius:8px;padding:14px 18px;text-decoration:none;transition:all .2s;margin-bottom:10px;cursor:pointer}

  /* ========================================
     RESPONSIVE 900px
  ======================================== */
  @media(max-width:900px){
    nav{padding:16px 20px}
    .nav-links{display:none}
    .nav-mobile-btn{display:block}
    .detail-hero{padding:76px 24px 20px}
    .detail-grid{grid-template-columns:1fr;padding:24px 20px;gap:28px}
    .sticky-card{position:static}
    /* Sur tablette on met la sticky card EN PREMIER (avant le contenu) */
    .detail-grid{display:flex;flex-direction:column}
    .sticky-col{order:-1}
    .related-grid{grid-template-columns:1fr 1fr}
    footer{padding:40px 24px}
    .footer-grid{grid-template-columns:1fr 1fr;gap:32px}
    .footer-bottom{flex-direction:column;gap:12px;text-align:center}
  }

  /* ========================================
     RESPONSIVE 600px MOBILE
  ======================================== */
  @media(max-width:600px){
    nav{padding:14px 16px}

    /* Hero */
    .detail-hero{padding:70px 16px 0;min-height:0}
    .breadcrumb{font-size:11px;gap:6px}

    /* Grid — 1 col, sticky card cachée sur mobile (remplacée par la barre sticky bottom) */
    .detail-grid{padding:20px 16px 100px;gap:24px} /* padding-bottom pour la barre sticky */
    .sticky-col{display:none} /* on cache la sidebar sur mobile */
    .mobile-cta-bar{display:block} /* on affiche la barre sticky bottom */

    /* Image principale */
    .content-col > div[style*="max-height:380px"] img,
    .content-col img[style*="max-height:380px"]{max-height:220px}

    /* Titres */
    .detail-title{font-size:clamp(24px,7vw,34px)}
    .section-block h3{font-size:19px}

    /* Screenshots */
    .ss-slide img{height:220px}
    .ss-arrow{width:32px;height:32px;font-size:16px}
    /* Related */
    .related-grid{grid-template-columns:1fr}

    /* Garantie */
    .garantie-box{padding:14px 16px;gap:10px}

    /* Related section pleine largeur */
    .related-section{padding:0 16px 36px}

    /* Footer */
    footer{padding:32px 16px}
    .footer-grid{grid-template-columns:1fr;gap:20px}
    .footer-bottom{flex-direction:column;gap:12px;text-align:center}
    .footer-bottom > div:last-child{flex-wrap:wrap;justify-content:center}
  }

  @media(max-width:380px){
    .mobile-cta-price{font-size:22px}
    .mobile-cta-btn{font-size:13px;padding:13px 10px}
    .mobile-cta-tg{padding:13px 10px;font-size:12px}
  }
</style>
</head>
<body>
<div id="nav-placeholder"></div>

<!-- HERO BREADCRUMB -->
<div id="heroSection" class="detail-hero"></div>

<!-- MAIN CONTENT -->
<div id="mainContent">
  <div style="text-align:center;padding:80px 20px;color:#555">
    <div style="font-size:32px;margin-bottom:12px">⚡</div>
    <div>Chargement...</div>
  </div>
</div>

<!-- MOBILE CTA BAR (sticky bottom, affiché seulement sur mobile) -->
<div class="mobile-cta-bar" id="mobileCta" style="display:none">
  <div class="mobile-cta-inner">
    <div class="mobile-cta-price" id="mobileCtaPrice">—</div>
    <button class="mobile-cta-btn" id="mobileCtaBtn" onclick="mobileCtaAction()">🛒 Commander</button>
    <button id="mobilePanierBtn" onclick="mobilePanierAction()" style="background:none;border:1px solid var(--border);color:#888;border-radius:6px;padding:14px 12px;font-size:16px;cursor:pointer;flex-shrink:0;transition:all .2s" title="Ajouter au panier">🛒+</button>
      </div>
</div>

<div id="footer-placeholder"></div>

<script>
const SUPABASE_URL = "https://xrljfmrsrxyepdsysfan.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhybGpmbXJzcnh5ZXBkc3lzZmFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NzY0NTcsImV4cCI6MjA5NTA1MjQ1N30.lmYKrJ_q4F_wWY0eKYR-vrQVgSrbXCNG7XhxPj7J_4E";

const CAT_EMOJIS = {
  'Ecommerce/Dropshipping':'📦','Trading/Crypto':'📈','IA':'🤖','Immobilier/Location':'🏠',
  'Marketing/Réseaux Sociaux':'📣','Vente/Closing/Affiliation':'💰',
  'Business/SMMA':'💼','Entreprise/Fiscalité':'🏛️','Informatique/Tech':'💻',
  'Développement Personnel':'🧠','Séduction/Relations':'❤️',
  'Sport/Santé':'💪','No Limits':'⚡','OFM':'💎',
  'Trading':'📈','Dropshipping':'📦','Immobilier':'🏠','SMMA':'💼','Réseaux Sociaux':'📣'
};

async function sbGet(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`}
  });
  return res.json();
}

function cardHtml(f) {
  const isFree = f.prix?.toLowerCase() === 'gratuit';
  const emoji = f.emoji || CAT_EMOJIS[f.categorie] || '📚';
  const imgHtml = f.image_principale
    ? `<img src="${f.image_principale}" style="width:100%;height:154px;object-fit:cover;object-position:center 25%;display:block" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="card-img-placeholder" style="display:none">${emoji}</div>`
    : `<div class="card-img-placeholder">${emoji}</div>`;
  return `
  <div class="formation-card" onclick="window.location='formation.html?id=${f.id}'">
    ${f.badge ? `<div class="card-badge ${f.badge==='Gratuit'?'free':f.badge==='Nouveau'?'new':''}">${f.badge}</div>` : ''}
    ${imgHtml}
    <div class="card-body">
      <div class="card-category">${f.categorie||''}</div>
      <div class="card-title">${f.titre}</div>
      <div class="card-author">Par ${f.auteur||''}</div>
      <div class="card-stars"><span class="star">★★★★★</span><span class="rating-count">4.9 (avis)</span></div>
      <div class="card-footer">
        <div>
          ${isFree ? '<span class="card-price-free">Gratuit</span>' : `<span class="card-price">${f.prix}</span>${f.ancien_prix ? `<span class="card-price-old">${f.ancien_prix}</span>` : ''}`}
          <div style="font-size:10px;color:var(--text-muted);letter-spacing:.5px;margin-top:2px">Accès à vie</div>
        </div>
        <button class="btn-card" onclick="event.stopPropagation();window.location='formation.html?id=${f.id}'">Découvrir →</button>
      </div>
    </div>
  </div>`;
}

function handleBuy(id) {
  if (id === window._formation?.id) { buyNow(); return; }
  window.location = 'formation.html?id=' + id;
}

// ── PAIEMENT MODAL ──
function showPaymentModal(f) {
  const isMob = window.innerWidth <= 600;
  const overlay = document.createElement('div');
  overlay.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;display:flex;align-items:${isMob?'flex-end':'center'};justify-content:center;padding:0;backdrop-filter:blur(12px)`;
  const hasStripe = !!f.stripe_link;
  const hasPaypal = !!f.paypal_link;
  const hasBinance = !!f.binance_id;

async function init() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { window.location.href = 'formations.html'; return; }
  try {
    const data = await sbGet(`formations?id=eq.${id}&select=*`);
    if (!Array.isArray(data) || data.length === 0) {
      document.getElementById('mainContent').innerHTML = `<div style="text-align:center;padding:80px 20px;color:#555"><div style="font-size:40px;margin-bottom:16px">😕</div><div>Formation introuvable</div><a href="formations.html" style="color:var(--gold);text-decoration:none;margin-top:16px;display:inline-block">← Retour au catalogue</a></div>`;
      return;
    }
    formation = data[0];
    window._formation = formation;

    // Titre dynamique
    document.title = formation.titre + ' — FormationElite.fr';

    // Meta description dynamique
    const desc = formation.description
      ? formation.description.slice(0, 155) + (formation.description.length > 155 ? '...' : '')
      : `Accédez à la formation ${formation.titre} sur FormationElite.fr. Livraison immédiate, accès à vie.`;

    let metaDesc = document.querySelector('meta[name="description"]');
    if (!metaDesc) {
      metaDesc = document.createElement('meta');
      metaDesc.name = 'description';
      document.head.appendChild(metaDesc);
    }
    metaDesc.content = desc;

    // Open Graph (pour partage sur réseaux sociaux)
    const ogTags = {
      'og:title': formation.titre + ' — FormationElite.fr',
      'og:description': desc,
      'og:type': 'product',
      'og:url': `https://formationelite.vip/formation.html?id=${formation.id}`,
      'og:image': formation.image_principale || 'https://formationelite.vip/logo.jpg'
    };
    Object.entries(ogTags).forEach(([property, content]) => {
      let tag = document.querySelector(`meta[property="${property}"]`);
      if (!tag) {
        tag = document.createElement('meta');
        tag.setAttribute('property', property);
        document.head.appendChild(tag);
      }
      tag.setAttribute('content', content);
    });
    const related = await sbGet(`formations?categorie=eq.${encodeURIComponent(formation.categorie)}&actif=eq.true&id=neq.${id}&limit=4&select=*`);
    allFormations = Array.isArray(related) ? related : [];
    renderPage();
    initMobileCta();
    initScreenshotCarousel();
  } catch(e) { console.error(e); }

let ssIndex = 0, ssTotal = 0, ssTimer = null;
function initScreenshotCarousel() {
  const track = document.getElementById('ssTrack');
  if (!track) return;
  ssTotal = track.children.length;
  ssIndex = 0;
  if (ssTotal <= 1) return;
  clearInterval(ssTimer);
  ssTimer = setInterval(() => ssMove(1), 4000);
}
function ssMove(dir) {
  ssIndex = (ssIndex + dir + ssTotal) % ssTotal;
  ssUpdate();
}
function ssGoTo(i) {
  ssIndex = i;
  ssUpdate();
  clearInterval(ssTimer);
  ssTimer = setInterval(() => ssMove(1), 4000);
}
function ssUpdate() {
  const track = document.getElementById('ssTrack');
  if (!track) return;
  track.style.transform = `translateX(-${ssIndex*100}%)`;
  document.querySelectorAll('#ssDots .ss-dot').forEach((d,i) => d.classList.toggle('active', i===ssIndex));
}

function calcRemise(prix, ancien) {
  const p = parseFloat(prix?.replace('€','').replace(',','.'));
  const a = parseFloat(ancien?.replace('€','').replace(',','.'));
  if (!p || !a || a <= p) return '';
  return Math.round((1 - p/a) * 100);
}

function openImg(src) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;cursor:zoom-out;backdrop-filter:blur(10px)';
  overlay.innerHTML = `<div style="position:relative;max-width:800px;width:100%"><img src="${src}" style="width:100%;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,0.8)"><button onclick="this.closest('[style*=fixed]').remove()" style="position:absolute;top:-14px;right:-14px;background:var(--gold);border:none;color:#080808;width:32px;height:32px;border-radius:50%;font-size:14px;cursor:pointer;font-weight:700">✕</button></div>`;
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

<script>
const PANIER_KEY="fe_panier";
function getPanier(){try{return JSON.parse(localStorage.getItem(PANIER_KEY))||[];}catch(e){return[];}}
function savePanier(items){localStorage.setItem(PANIER_KEY,JSON.stringify(items));updatePanierBadge();if(document.getElementById("panierDrawer"))renderPanierDrawer();}
function ajouterAuPanier(formation){const panier=getPanier();const existe=panier.find(f=>f.id===formation.id);if(existe){showPanierToast("📚 Déjà dans votre panier !","info");ouvrirPanier();return;}panier.push({id:formation.id,titre:formation.titre,prix:formation.prix,prixNum:parseFloat((formation.prix||"0").replace("€","").replace(",",".").trim())||0,emoji:formation.emoji||"📚",auteur:formation.auteur||"",categorie:formation.categorie||""});savePanier(panier);showPanierToast("🛒 Ajouté au panier !","success");}
function retirerDuPanier(id){savePanier(getPanier().filter(f=>f.id!==id));}
function viderPanier(){savePanier([]);}
function getTotalPanier(){return getPanier().reduce((sum,f)=>sum+(f.prixNum||0),0);}
function updatePanierBadge(){const count=getPanier().length;document.querySelectorAll(".panier-badge").forEach(el=>{el.textContent=count;el.style.display=count>0?"flex":"none";});}
function showPanierToast(msg,type){let t=document.getElementById("panierToast");if(!t){t=document.createElement("div");t.id="panierToast";t.style.cssText="position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#0f0f0f;border:1px solid rgba(201,168,76,0.3);border-radius:100px;padding:12px 22px;font-family:sans-serif;font-size:13px;color:#f0ece0;z-index:9999;opacity:0;transition:all .3s ease;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.6);pointer-events:none";document.body.appendChild(t);}t.style.borderColor=type==="info"?"rgba(41,182,246,0.4)":"rgba(46,204,113,0.4)";t.textContent=msg;t.style.opacity="1";t.style.transform="translateX(-50%) translateY(0)";clearTimeout(t._timer);t._timer=setTimeout(()=>{t.style.opacity="0";t.style.transform="translateX(-50%) translateY(20px)";},2800);}
function injectPanierDrawer(){if(document.getElementById("panierDrawer"))return;const d=document.createElement("div");d.id="panierDrawer";d.style.cssText="position:fixed;inset:0;z-index:9998;display:none;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px)";d.innerHTML='<div id="panierPanel" style="position:absolute;top:0;right:0;bottom:0;width:100%;max-width:420px;background:#0f0f0f;border-left:1px solid rgba(201,168,76,0.2);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow:hidden"><div style="padding:20px 24px;border-bottom:1px solid rgba(201,168,76,0.12);display:flex;justify-content:space-between;align-items:center;flex-shrink:0"><div><div style="font-family:Cormorant Garamond,serif;font-size:22px;color:#f0ece0">Mon Panier</div><div style="font-size:12px;color:#555;margin-top:2px" id="panierCount">0 formation</div></div><button onclick="fermerPanier()" style="background:none;border:1px solid #1a1a1a;color:#666;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center">✕</button></div><div id="panierItems" style="flex:1;overflow-y:auto;padding:16px 20px"></div><div id="panierFooter" style="padding:20px 24px;border-top:1px solid rgba(201,168,76,0.12);flex-shrink:0"></div></div>';document.body.appendChild(d);d.addEventListener("click",e=>{if(e.target===d)fermerPanier();});renderPanierDrawer();}
function renderPanierDrawer(){const panier=getPanier();const total=getTotalPanier();const count=panier.length;const c=document.getElementById("panierCount");if(c)c.textContent=count+" formation"+(count>1?"s":"");const items=document.getElementById("panierItems");if(items){if(count===0){items.innerHTML='<div style="text-align:center;padding:60px 20px;color:#444"><div style="font-size:48px;margin-bottom:16px">🛒</div><div style="font-size:15px;margin-bottom:8px;color:#666">Votre panier est vide</div><div style="font-size:13px;color:#333">Ajoutez des formations pour commencer</div><a href="formations.html" onclick="fermerPanier()" style="display:inline-block;margin-top:20px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);color:#c9a84c;padding:10px 24px;border-radius:4px;text-decoration:none;font-size:13px">Voir les formations →</a></div>';}else{items.innerHTML=panier.map(f=>{const id=f.id.replace(/'/g,"\'");return `<div style="display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.04)"><div style="font-size:28px;flex-shrink:0;width:40px;text-align:center">${f.emoji}</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:#f0ece0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.titre}</div><div style="font-size:11px;color:#555;margin-top:2px">${f.categorie}</div></div><div style="font-family:Cormorant Garamond,serif;font-size:18px;color:#e8c97a;flex-shrink:0">${f.prix}</div><button onclick="retirerDuPanier('${id}')" style="background:none;border:none;color:#555;cursor:pointer;font-size:18px;padding:4px;flex-shrink:0;line-height:1">✕</button></div>`;}).join("");}}const footer=document.getElementById("panierFooter");if(footer){if(count===0){footer.innerHTML="";}else{footer.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span style="font-size:14px;color:#888">Total</span><span style="font-family:Cormorant Garamond,serif;font-size:28px;color:#e8c97a;font-weight:600">${total.toFixed(2)}€</span></div><button onclick="commanderPanier()" style="width:100%;background:#c9a84c;color:#080808;border:none;border-radius:6px;padding:15px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;margin-bottom:10px">🛒 Commander (${total.toFixed(2)}€)</button><button onclick="viderPanier()" style="width:100%;background:none;border:1px solid #1a1a1a;color:#555;padding:11px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px">Vider le panier</button>`;}}}
function ouvrirPanier(){injectPanierDrawer();const d=document.getElementById("panierDrawer");const p=document.getElementById("panierPanel");if(!d)return;d.style.display="block";requestAnimationFrame(()=>{p.style.transform="translateX(0)";});document.body.style.overflow="hidden";}
function fermerPanier(){const d=document.getElementById("panierDrawer");const p=document.getElementById("panierPanel");if(!d)return;p.style.transform="translateX(100%)";setTimeout(()=>{d.style.display="none";document.body.style.overflow="";},350);}
function commanderPanier(){const panier=getPanier();if(panier.length===0)return;const total=getTotalPanier();if(panier.length===1){const f=panier[0];fermerPanier();window.location.href="checkout.html?id="+f.id+"&titre="+encodeURIComponent(f.titre)+"&prix="+encodeURIComponent(f.prix)+"&emoji="+encodeURIComponent(f.emoji);}else{const ids=panier.map(f=>f.id).join(",");const titres=panier.map(f=>f.titre).join(" + ");fermerPanier();window.location.href="checkout.html?mode=panier&ids="+encodeURIComponent(ids)+"&titre="+encodeURIComponent(titres.slice(0,80))+"&prix="+encodeURIComponent(total.toFixed(2)+"€")+"&emoji=🛒&count="+panier.length;}}
document.addEventListener("DOMContentLoaded",function(){injectPanierDrawer();updatePanierBadge();});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finaliser votre commande — FormationElite</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold:#c9a84c;--gold-light:#e8c97a;--bg:#080808;--bg2:#0f0f0f;--bg3:#151515;--border:rgba(201,168,76,0.15);--text:#f0ece0;--text-muted:#6b6556; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes spin{to{transform:rotate(360deg)}}

        .container{width:100%;max-width:520px;background:var(--bg2);border:1px solid rgba(201,168,76,0.25);border-radius:16px;overflow:hidden;animation:fadeUp .4s ease}

        /* Header */
        .header{padding:28px 28px 20px;border-bottom:1px solid var(--border);text-align:center}
        .logo{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold-light);margin-bottom:4px}
        .header-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--text)}

        /* Formation card */
        .formation-card{margin:20px 24px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:18px 20px;display:flex;align-items:center;gap:14px}
        .formation-emoji{font-size:36px;flex-shrink:0}
        .formation-info{flex:1;min-width:0}
        .formation-titre{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .formation-sub{font-size:12px;color:var(--text-muted);margin-top:3px}
        .formation-prix{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--gold-light);flex-shrink:0}

        /* Options */
        .options-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);padding:0 24px;margin-bottom:12px}
        .options{padding:0 24px 24px;display:flex;flex-direction:column;gap:10px}

        .pay-btn{display:flex;align-items:center;gap:16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px 18px;cursor:pointer;transition:all .25s;text-align:left;width:100%;font-family:inherit;color:var(--text);position:relative;overflow:hidden}
        .pay-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
        .pay-btn:active{transform:translateY(0)}
        .pay-btn.stripe:hover{border-color:rgba(201,168,76,0.5);background:#1a1610}
        .pay-btn.paypal:hover{border-color:rgba(0,112,240,0.4);background:#0a0f1a}
        .pay-btn.crypto:hover{border-color:rgba(247,147,26,0.4);background:#1a1208}
        .pay-btn.loading{opacity:0.6;pointer-events:none}

        .pay-icon{font-size:30px;flex-shrink:0;width:40px;text-align:center}
        .pay-label{font-size:14px;font-weight:600;color:var(--text)}
        .pay-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
        .pay-arrow{margin-left:auto;color:var(--gold);font-size:18px;flex-shrink:0}

        /* Loading spinner */
        .spinner{width:18px;height:18px;border:2px solid rgba(201,168,76,0.3);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;margin-left:auto}

        /* Error */
        .error-box{margin:0 24px 16px;background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);border-radius:8px;padding:12px 16px;font-size:13px;color:#e74c3c;display:none}

        /* Back button */
        .back-btn{display:block;width:calc(100% - 48px);margin:0 24px 24px;padding:13px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--text-muted);font-family:inherit;font-size:13px;cursor:pointer;transition:all .2s;text-align:center}
        .back-btn:hover{border-color:var(--gold);color:var(--gold-light)}

        /* Trust */
        .trust{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
        .trust-item{font-size:11px;color:#444;display:flex;align-items:center;gap:5px}

        @media(max-width:480px){
            body{align-items:flex-end;padding:0}
            .container{border-radius:16px 16px 0 0;max-width:100%}
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">FormationElite.fr</div>
        <div class="header-title">Finaliser votre commande</div>
    </div>

    <div class="formation-card">
        <div class="formation-emoji" id="fEmoji">📚</div>
        <div class="formation-info">
            <div class="formation-titre" id="fTitre">Chargement...</div>
            <div class="formation-sub" id="fSub">Accès immédiat · À vie</div>
        </div>
        <div class="formation-prix" id="fPrix">—</div>
    </div>

    <div class="options-title">Choisissez votre moyen de paiement</div>
    <div class="error-box" id="errorBox"></div>
    <div class="options">

        <!-- STRIPE -->
        <button class="pay-btn stripe" id="btnStripe" onclick="payWithStripe()">
            <span class="pay-icon">💳</span>
            <div>
                <div class="pay-label">Carte bancaire</div>
                <div class="pay-sub">Visa, Mastercard, Apple Pay</div>
            </div>
            <span class="pay-arrow">→</span>
        </button>

        <!-- PAYPAL -->
        <button class="pay-btn paypal" id="btnPaypal" onclick="payWithPaypal()">
            <span class="pay-icon">🅿️</span>
            <div>
                <div class="pay-label">PayPal</div>
                <div class="pay-sub">Solde PayPal ou carte</div>
            </div>
            <span class="pay-arrow">→</span>
        </button>

        <!-- CRYPTO -->
        <button class="pay-btn crypto" id="btnCrypto" onclick="payWithCrypto()">
            <span class="pay-icon">₿</span>
            <div>
                <div class="pay-label">Cryptomonnaie</div>
                <div class="pay-sub">Bitcoin, Ethereum, USDT, etc.</div>
            </div>
            <span class="pay-arrow">→</span>
        </button>

    </div>

    <button class="back-btn" onclick="window.history.back()">← Retour aux formations</button>

    <div class="trust">
        <span class="trust-item">🔒 Paiement sécurisé</span>
        <span class="trust-item">⚡ Accès immédiat</span>
        <span class="trust-item">📦 Produit numérique</span>
    </div>
</div>

<script>
    // ── Lecture des paramètres URL ──
    const params = new URLSearchParams(window.location.search);
    const mode   = params.get('mode') || 'single';
    const id     = params.get('id') || '';
    const ids    = params.get('ids') || '';
    const titre  = decodeURIComponent(params.get('titre') || 'Formation');
    const prixStr= decodeURIComponent(params.get('prix') || '0€');
    const emoji  = decodeURIComponent(params.get('emoji') || '📚');
    const count  = parseInt(params.get('count') || '1');
    const prix   = parseFloat(prixStr.replace('€','').replace(',','.').trim()) || 0;

    // Affichage
    document.getElementById('fEmoji').textContent  = emoji;
    document.getElementById('fTitre').textContent  = mode === 'panier'
      ? `${count} formations sélectionnées`
      : titre;
    document.getElementById('fPrix').textContent   = prixStr;
    if (mode === 'panier') {
      document.getElementById('fSub').textContent = titre.slice(0, 60) + (titre.length > 60 ? '...' : '');
    }
    document.title = `Paiement — ${mode === 'panier' ? count+' formations' : titre} — FormationElite`;

    function showError(msg) {
        const box = document.getElementById('errorBox');
        box.textContent = msg;
        box.style.display = 'block';
        setTimeout(() => box.style.display = 'none', 5000);
    }

    function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        const arrow = btn.querySelector('.pay-arrow');
        if (loading) {
            btn.classList.add('loading');
            if (arrow) arrow.outerHTML = '<div class="spinner"></div>';
        } else {
            btn.classList.remove('loading');
            const spinner = btn.querySelector('.spinner');
            if (spinner) spinner.outerHTML = '<span class="pay-arrow">→</span>';
        }
    }

    // ── STRIPE ──
    async function payWithStripe() {
        setLoading('btnStripe', true);
        try {
            const body = mode === 'panier'
                ? { mode: 'panier', ids, formation_titre: `${count} formations`, formation_prix: prixStr, formation_emoji: '🛒' }
                : { formation_id: id, formation_titre: titre, formation_prix: prixStr, formation_emoji: emoji };

            const res = await fetch('/api/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (data.url) {
                window.location.href = data.url;
            } else {
                throw new Error(data.error || 'Lien Stripe manquant');
            }
        } catch(err) {
            showError('Erreur Stripe : ' + err.message + '. Essayez PayPal ou Telegram.');
            setLoading('btnStripe', false);
        }
    }

    // ── PAYPAL ──
    function payWithPaypal() {
        // PayPal.me arrondit à 2 décimales
        const montant = prix.toFixed(2);
        window.location.href = `https://paypal.me/paultogbedji/${montant}`;
    }

    // ── CRYPTO (NowPayments) ──
    async function payWithCrypto() {
        setLoading('btnCrypto', true);
        try {
            const res = await fetch('/api/crypto-checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    formation_id:    mode === 'panier' ? ids : id,
                    formation_titre: mode === 'panier' ? `${count} formations` : titre,
                    amount:          prix,
                    currency:        'EUR'
                })
            });
            const data = await res.json();
            if (data.payment_url) {
                window.location.href = data.payment_url;
            } else {
                throw new Error(data.error || 'URL de paiement manquante');
            }
        } catch(err) {
            showError('Erreur crypto : ' + err.message + '. Essayez une autre méthode.');
            setLoading('btnCrypto', false);
        }
    }
</script>
</body>
</html>
